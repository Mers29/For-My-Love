// ── COUNTER ──────────────────────────────────────────────
function startCounter(){
  function tick(){
    const diff = Date.now() - START_DATE;
    const ts = Math.floor(diff / 1000), s = ts % 60;
    const tm = Math.floor(ts / 60), mi = tm % 60;
    const th = Math.floor(tm / 60), h = th % 24;
    const td = Math.floor(th / 24);
    const y = Math.floor(td / 365), mo = Math.floor((td % 365) / 30), d = td % 30;
    document.getElementById('cy').textContent = y;
    document.getElementById('cmo').textContent = mo;
    document.getElementById('cd').textContent = d;
    document.getElementById('ch').textContent = h;
    document.getElementById('cm').textContent = mi;
    document.getElementById('cs').textContent = s;
  }
  tick();
  setInterval(tick, 1000);
}

// ── NAV ──────────────────────────────────────────────────

// ── HELPERS ──────────────────────────────────────────────
function fmtDate(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'})+', '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
}
function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime(), days = Math.floor(diff/86400000);
  if(days<1) return 'Today';
  if(days===1) return 'Yesterday';
  if(days<30) return days+' days ago';
  if(days<365) return Math.floor(days/30)+' months ago';
  return Math.floor(days/365)+' years ago';
}
function daysUntil(dateStr){
  const d = new Date(dateStr), now = new Date();
  now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.ceil((d-now)/86400000);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pn(n){ return P[n-1]||'Partner '+n; }

// ── IMAGE COMPRESS ────────────────────────────────────────
function compressImage(file, maxW=900, quality=0.72){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── API ───────────────────────────────────────────────────
let store = { letters: [], notes: [], music: [], gallery: [], questions: [], memories: [], events: [], movies: [] };

async function apiRequest(options = {}) {
  const res = await fetch(window.API_BASE, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });

  const text = await res.text();
  if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
  return text ? JSON.parse(text) : null;
}

async function loadBackendData(){
  const data = await apiRequest({ method: 'GET' });
  store = data || store;
  allEvents = store.events || [];
  allMovies = store.movies || [];
  renderLetters(store.letters || []);
  renderNotes(store.notes || []);
  renderMusic(store.music || []);
  renderGallery(store.gallery || []);
  renderQuestions(store.questions || []);
  renderMemories(store.memories || []);
  renderEvents();
  renderBanner();
  renderMovies();
  renderCalendar();
}

function initBackend(){
  const now = new Date();
  calY = now.getFullYear();
  calM = now.getMonth();
  renderCalendar();
  return loadBackendData();
}

async function addTrack(){
  const name = document.getElementById('track-name').value.trim();
  if(!name){ alert('Enter track name'); return; }

  const fileInput = document.getElementById('music-file');
  const urlVal = document.getElementById('music-url').value.trim();
  let fileData = '', url = '';
  const prog = document.getElementById('music-progress');

  if(document.getElementById('mtab-file').style.display !== 'none' && fileInput.files[0]){
    const file = fileInput.files[0];
    if(file.size > 1500000){
      alert('File too large. Max ~1.5 MB. Compress or use a link.');
      return;
    }
    prog.style.display = 'block';
    prog.textContent = 'Reading file...';
    fileData = await new Promise(res=>{
      const r = new FileReader();
      r.onload = e=>res(e.target.result);
      r.readAsDataURL(file);
    });
    prog.textContent = 'Saving...';
  } else if(urlVal){
    url = urlVal;
  } else {
    alert('Upload a file or paste a link');
    return;
  }

  await apiRequest({
    method: 'POST',
    body: JSON.stringify({ collection: 'music', item: { name, who: who.m, fileData, url } })
  });

  document.getElementById('track-name').value = '';
  fileInput.value = '';
  document.getElementById('music-url').value = '';
  prog.style.display = 'none';
  await loadBackendData();
}
window.addTrack = addTrack;

// ── CALENDAR ──────────────────────────────────────────────
function changeMonth(d){
  calM += d;
  if(calM > 11){ calM = 0; calY++; }
  if(calM < 0){ calM = 11; calY--; }
  renderCalendar();
}
window.changeMonth = changeMonth;

function renderCalendar(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-lbl').textContent = months[calM]+' '+calY;
  const grid = document.getElementById('cal-grid');
  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html = days.map(d=>`<div class="cal-dlabel">${d}</div>`).join('');
  const first = new Date(calY,calM,1).getDay();
  const dim = new Date(calY,calM+1,0).getDate();
  const today = new Date();
  const evDates = new Set(allEvents.map(e=>e.date));
  for(let i=0;i<first;i++){
    const pd = new Date(calY,calM,-(first-i-1));
    html += `<div class="cal-day other-month">${pd.getDate()}</div>`;
  }
  for(let d=1; d<=dim; d++){
    const ds = calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = d===today.getDate() && calM===today.getMonth() && calY===today.getFullYear();
    const hasEv = evDates.has(ds);
    html += `<div class="cal-day${isToday?' today':''}${hasEv?' has-event':''}" onclick="document.getElementById('ev-date').value='${ds}';document.getElementById('ev-name').focus();">${d}</div>`;
  }
  grid.innerHTML = html;
}

async function addEvent(){
  const name = document.getElementById('ev-name').value.trim();
  const date = document.getElementById('ev-date').value;
  if(!name || !date){ alert('Enter name and date'); return; }
  await apiRequest({
    method: 'POST',
    body: JSON.stringify({
      collection: 'events',
      item: {
        name,
        date,
        time: document.getElementById('ev-time').value,
        cat: document.getElementById('ev-cat').value,
        desc: document.getElementById('ev-desc').value.trim()
      }
    })
  });
  ['ev-name','ev-date','ev-time','ev-desc'].forEach(id=>document.getElementById(id).value='');
  await loadBackendData();
}
window.addEvent = addEvent;

const catIcon = { anniversary:'💕', birthday:'🎂', reminder:'🔔', plans:'🎉', other:'📌' };
function renderEvents(){
  const el = document.getElementById('events-list');
  const up = allEvents.filter(e=>daysUntil(e.date)>=0).sort((a,b)=>a.date.localeCompare(b.date));
  if(!up.length){
    el.innerHTML = '<div class="empty-state"><div class="ei">📅</div>No upcoming events!</div>';
    return;
  }
  el.innerHTML = up.map(i=>{
    const d = daysUntil(i.date);
    return `<div class="event-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="event-name">${catIcon[i.cat]||'📌'} ${esc(i.name)}</div>
          <div class="event-date">${i.date}${i.time?' at '+i.time:''} · ${d===0?'Today! 🎉':'in '+d+' days'}</div>
          ${i.desc?`<div class="event-desc">${esc(i.desc)}</div>`:''}
        </div>
        <button class="btn-danger" onclick="delDoc('events','${i.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderBanner(){
  const up = allEvents.filter(e=>{
    const d = daysUntil(e.date);
    return d>=0 && d<=30;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const wrap = document.getElementById('event-banner-top');
  if(!up.length){ wrap.innerHTML=''; return; }
  const ev = up[0], d = daysUntil(ev.date);
  wrap.innerHTML = `<div class="event-banner" style="max-width:640px;margin:0 auto 16px;">${d===0?'🎉 Today: '+esc(ev.name)+'!':'⏰ '+esc(ev.name)+' in '+d+' days ❤️'}</div>`;
}

function filterMovies(f){
  movFilter = f;
  document.querySelectorAll('#movies-panel .tabs .tab-btn').forEach((b,i)=>
    b.classList.toggle('active', ['all','want','watching','done'][i] === f)
  );
  renderMovies();
}
window.filterMovies = filterMovies;

const sLabel = { want:'Want to watch', watching:'Watching', done:'Finished ✓' };
const sClass = { want:'s-want', watching:'s-watching', done:'s-done' };
function renderMovies(){
  const el = document.getElementById('movies-list');
  const list = movFilter==='all' ? allMovies : allMovies.filter(m=>m.status===movFilter);
  if(!list.length){
    el.innerHTML = '<div class="empty-state"><div class="ei">🎬</div>Nothing here!</div>';
    return;
  }
  el.innerHTML = list.map(i=>`
    <div class="movie-item">
      <div class="movie-icon">${i.type==='series'?'📺':'🎬'}</div>
      <div class="movie-info">
        <div class="movie-title">${esc(i.title)}</div>
        <div class="movie-type">${i.type==='series'?'Series':'Movie'} · ${pn(i.who)}</div>
        <div><span class="movie-status ${sClass[i.status]}">${sLabel[i.status]}</span></div>
        ${i.rating ? `<div class="movie-rating">${'⭐'.repeat(i.rating)}</div>` : ''}
        ${i.note ? `<div class="movie-note">${esc(i.note)}</div>` : ''}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center;">
          <select onchange="updMovie('${i.id}','status',this.value)" class="form-select" style="width:auto;padding:4px 10px;font-size:0.76rem;border-radius:999px;">
            <option value="want" ${i.status==='want'?'selected':''}>Want</option>
            <option value="watching" ${i.status==='watching'?'selected':''}>Watching</option>
            <option value="done" ${i.status==='done'?'selected':''}>Done</option>
          </select>
          <div class="star-rate" onclick="rateMovie('${i.id}',event)">
            ${[1,2,3,4,5].map(n=>`<span class="${(i.rating||0)>=n?'on':''}" data-v="${n}">★</span>`).join('')}
          </div>
          <button class="btn-danger" onclick="delDoc('movies','${i.id}')">✕</button>
        </div>
      </div>
    </div>`).join('');
}

async function updMovie(id,field,val){
  await apiRequest({
    method: 'PUT',
    body: JSON.stringify({ collection: 'movies', id, patch: { [field]: val } })
  });
  await loadBackendData();
}
async function rateMovie(id,e){
  const v = parseInt(e.target.dataset.v);
  if(!v) return;
  await updMovie(id,'rating',v);
}
window.updMovie = updMovie;
window.rateMovie = rateMovie;

// ── GENERIC DELETE ────────────────────────────────────────
async function delDoc(col,id){
  if(!confirm('Delete?')) return;
  await apiRequest({
    method: 'DELETE',
    body: JSON.stringify({ collection: col, id })
  });
  await loadBackendData();
}
window.delDoc = delDoc;
</script>
